name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to push the built site to the gh-pages branch.
permissions:
  contents: write

# Never run two deploys at once; newer pushes supersede older ones.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web export
        # expo export -p web + .nojekyll + SPA 404 fallback
        run: npm run build:web

      - name: Publish dist/ to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
